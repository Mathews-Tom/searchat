[campaign]
name = "v2-migration"
description = "Migrate Searchat from Parquet+FAISS to DuckDB unified architecture (v0.7.0)"
project_root = "/Users/druk/WorkSpace/AetherForge/searchat"
base_branch = "main"
created = "2026-03-29"

[campaign.coordination]
global_rules = [
  "CRITICAL: Parquet files are IRREPLACEABLE — NEVER delete any .parquet or .faiss files",
  "Safety guards: index_all() RuntimeError and /api/reindex 403 must be preserved in ALL phases",
  "All 144 existing tests must pass after every commit — run: uv run pytest tests/ -x",
  "Conventional commits: feat(scope): description — see .claude/rules/commit-standards.md",
  "Push to origin (fork) only — NEVER push to upstream",
  "No AI attribution in commits (no Co-Authored-By, no 'Generated with Claude Code')",
  "Python typing: built-in generics, | unions, from __future__ import annotations",
  "Package manager: uv only (uv add, uv run, uv pip list) — NEVER pip/pip3",
  "Read CLAUDE.md for data safety rules before touching any storage code",
  "Reference upstream v2 code: git fetch upstream && git show upstream/main:<path>",
]
protected_files = [
  "src/searchat/expertise/",
  "src/searchat/knowledge_graph/",
  "src/searchat/services/bookmarks.py",
  "src/searchat/services/saved_queries.py",
  "src/searchat/services/dashboards.py",
  "src/searchat/services/analytics.py",
  "src/searchat/services/backup.py",
  "src/searchat/services/backup_contracts.py",
  "src/searchat/services/backup_crypto.py",
  "src/searchat/services/chat_service.py",
  "src/searchat/services/export_service.py",
  "src/searchat/services/pattern_mining.py",
]

